{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-light rounded-circle d-inline-flex p-3 mb-3">
                        <i class="fas fa-user-plus fa-2x text-primary"></i>
                    </div>
                    <h2 class="h4 mb-1">Регистрация</h2>
                    <p class="text-muted small">Создайте новый аккаунт</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label>Логин *</label>
                        <input type="text" name="username" class="form-control" placeholder="ivanov" required>
                    </div>
                    <div class="mb-3">
                        <label>ФИО *</label>
                        <input type="text" name="full_name" class="form-control" placeholder="Иванов Иван Иванович" required>
                    </div>
                    <div class="mb-3">
                        <label>Роль</label>
                        <select name="role" class="form-select">
                            <option value="student">Ученик</option>
                            <option value="teacher">Учитель</option>
                            <option value="parent">Родитель</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Группа (для ученика)</label>
                        <input type="text" name="group" class="form-control" placeholder="П-41">
                    </div>
                    <div class="mb-3">
                        <label>Пароль *</label>
                        <input type="password" name="password" class="form-control" placeholder="минимум 4 символа" required>
                    </div>
                    <div class="mb-4">
                        <label>Подтверждение пароля *</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="повторите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-check me-2"></i> Зарегистрироваться
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <small class="text-muted">
                        Уже есть аккаунт? <a href="/login" class="text-primary">Войти</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
