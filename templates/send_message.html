{% extends "base.html" %}

{% block title %}Ответить {{ receiver.full_name }}{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-reply"></i> Ответить {{ receiver.full_name }}</h2>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-envelope"></i> Новое сообщение
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Кому</label>
                        <input type="text" class="form-control" value="{{ receiver.full_name }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сообщение</label>
                        <textarea name="message" class="form-control" rows="6" placeholder="Введите ваше сообщение..." required></textarea>
                    </div>
                    <input type="hidden" name="subject" value="Ответ на ваше сообщение">
                    <button type="submit" class="btn btn-success">Отправить</button>
                    <a href="/messages" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
