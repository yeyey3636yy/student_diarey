{% extends "base.html" %}

{% block title %}Студенты{% endblock %}

{% block content %}
<h2><i class="fas fa-users"></i> Студенты</h2>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>ФИО</th><th>Группа</th><th>Действия</th></tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.full_name }}</td>
                    <td>{{ student.group }}</td>
                    <td><a href="/teacher_student/{{ student.id }}" class="btn btn-sm btn-primary">Оценки</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
