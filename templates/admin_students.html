{% extends "base.html" %}

{% block title %}Все студенты{% endblock %}

{% block content %}
<h2><i class="fas fa-users"></i> Все студенты</h2>
<p class="text-muted">Список всех учащихся</p>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ФИО</th>
                        <th>Группа</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student.full_name }}</td>
                        <td>{{ student.group }}</td>
                        <td>
                            <a href="/admin_student/{{ student.id }}" class="btn btn-sm btn-primary">
                                <i class="fas fa-star"></i> Оценки
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
